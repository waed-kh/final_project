{% extends 'library/base.html' %}
{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm p-4 text-center">
        <img src="{{ book.cover.url }}" alt="{{ book.title }}" class="img-fluid rounded mb-3">
        <h3 class="fw-bold">{{ book.title }}</h3>
        <p><strong>Author:</strong> {{ book.author.name }}</p>
        <p><strong>Available Copies:</strong> {{ book.available_copies }} / {{ book.total_copies }}</p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-dark w-100 fw-bold mt-3">Confirm Borrow</button>
        </form>

        <p class="text-muted mt-2">Borrow Limit: {{ borrow_count }}/{{ max_limit }}</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
